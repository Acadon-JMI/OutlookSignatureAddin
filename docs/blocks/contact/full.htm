<table cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;">
  <tr>
    <td style="font-family:'Arial',sans-serif; font-size:13.5pt; font-weight:bold; color:#000; padding:0 0 2px 0;">
      <br />@@FirstName@@&nbsp;@@LastName@@
    </td>
  </tr>
  <tr>
    <td style="font-family:'Arial',sans-serif; font-size:10.5pt; color:#000; padding:0 0 2px 0; line-height:16.5pt;">
      @@JobTitle@@
    </td>
  </tr>
  <tr>
    <td style="font-family:'Arial',sans-serif; font-size:10.5pt; color:#000; padding:0 0 0 0; line-height:16.5pt;">
      @@CompanyName@@
    </td>
  </tr>
</table>
<table cellpadding="0" cellspacing="0" border="0" width="100%" style="border-collapse:collapse;">
  <tr style="height:22.5pt;">
    <td style="padding:0; height:22.5pt;"></td>
  </tr>
  <tr>
    <td style="border-bottom:1pt solid #5BC5F2; padding:0; font-size:0; line-height:0;">&nbsp;</td>
  </tr>
  <tr style="height:22.5pt;">
    <td style="padding:0; height:22.5pt;"></td>
  </tr>
</table>
<table cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;">
  <tr style="height:18.75pt;">
    <td width="30" style="width:22.5pt; padding:0; height:18.75pt; vertical-align:bottom;">
      <img src="@@AssetBaseUrl@@/icon-phone.png" alt="" width="13" height="13" style="display:block; border:0;" />
    </td>
    <td style="padding:0; height:18.75pt; font-family:'Arial',sans-serif; font-size:10pt; color:#000; line-height:16.5pt;">
      <a href="tel:@@TelefonNumber@@" style="color:#000; text-decoration:none;">@@TelefonNumber@@</a>
    </td>
  </tr>
  <tr style="height:18.75pt;">
    <td width="30" style="width:22.5pt; padding:0; height:18.75pt; vertical-align:bottom;">
      <img src="@@AssetBaseUrl@@/icon-email.png" alt="" width="13" height="13" style="display:block; border:0;" />
    </td>
    <td style="padding:0; height:18.75pt; font-family:'Arial',sans-serif; font-size:10pt; color:#000; line-height:16.5pt;">
      <a href="mailto:@@MailAddress@@" style="color:#000; text-decoration:none;">@@MailAddress@@</a>
    </td>
  </tr>
  <tr style="height:18.75pt;">
    <td width="30" style="width:22.5pt; padding:0; height:18.75pt; vertical-align:bottom;">
      <img src="@@AssetBaseUrl@@/icon-website.png" alt="" width="13" height="13" style="display:block; border:0;" />
    </td>
    <td style="padding:0; height:18.75pt; font-family:'Arial',sans-serif; font-size:10pt; color:#000; line-height:16.5pt;">
      <a href="https://@@WebsiteUrl@@" style="color:#000; text-decoration:none;">@@WebsiteUrl@@</a>
    </td>
  </tr>
  <tr style="height:18.75pt;">
    <td width="30" style="width:22.5pt; padding:0; height:18.75pt; vertical-align:bottom;">
      <img src="@@AssetBaseUrl@@/icon-address.png" alt="" width="13" height="13" style="display:block; border:0;" />
    </td>
    <td style="padding:0; height:18.75pt; font-family:'Arial',sans-serif; font-size:10pt; color:#000; line-height:16.5pt;">
      @@Address@@
    </td>
  </tr>
</table>
