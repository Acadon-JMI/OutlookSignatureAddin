<table cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;">
  <tr>
    <td style="font-family:'Arial',sans-serif; font-size:10.5pt; color:#000; padding:0 0 2px 0;">
      @@FirstName@@&nbsp;@@LastName@@
    </td>
  </tr>
  <tr>
    <td style="font-family:'Arial',sans-serif; font-size:10pt; color:#000; padding:0 0 2px 0; line-height:16.5pt;">
      <a href="tel:@@TelefonNumber@@" style="color:#000; text-decoration:none;">@@TelefonNumber@@</a>
      &nbsp;|&nbsp;
      <a href="mailto:@@MailAddress@@" style="color:#000; text-decoration:none;">@@MailAddress@@</a>
    </td>
  </tr>
</table>
