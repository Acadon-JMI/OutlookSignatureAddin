<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Signatur-Vorschau</title>
  <link rel="stylesheet" href="preview-dialog.css">
  <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>
</head>
<body>
  <div id="dialog-app">
    <header class="dialog-header">
      <h1>Signatur-Vorschau</h1>
    </header>

    <div id="dialog-preview" class="dialog-preview">
      <p class="info-text">Vorschau wird geladen...</p>
    </div>

    <div class="dialog-actions">
      <button id="cancel-btn" class="btn btn-secondary" type="button">Abbrechen</button>
      <button id="adopt-btn" class="btn btn-primary" type="button">Signatur &uuml;bernehmen</button>
    </div>
  </div>

  <script type="text/javascript" src="preview-dialog.js"></script>
</body>
</html>
